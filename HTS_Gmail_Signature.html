<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;">

<table role="presentation" cellspacing="0" cellpadding="0" border="0" style="font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <td style="padding:0;">

      <!-- Top coral rule -->
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td width="60" height="3" style="background-color:#D4614A;font-size:0;">&nbsp;</td>
          <td width="30" height="3" style="background-color:#2B5278;font-size:0;">&nbsp;</td>
          <td width="30" height="3" style="background-color:#5AADA8;font-size:0;">&nbsp;</td>
        </tr>
      </table>

      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top:12px;">
        <tr>

          <!-- Left — Symbol block -->
          <td valign="top" style="padding-right:16px;border-right:1px solid #EDE0CC;">
            <!-- Bold X-Star Symbol -->
            <svg viewBox="0 0 48 48" width="48" height="48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- NW petal — seafoam -->
              <path d="M24 24 L4 4 C7 13 15 20 24 24Z" fill="#5AADA8"/>
              <path d="M24 24 L4 4 C13 7 20 15 24 24Z" fill="#5AADA8" opacity="0.55"/>
              <!-- NE petal — navy -->
              <path d="M24 24 L44 4 C41 13 33 20 24 24Z" fill="#2B5278"/>
              <path d="M24 24 L44 4 C35 7 28 15 24 24Z" fill="#2B5278" opacity="0.55"/>
              <!-- SE petal — seafoam -->
              <path d="M24 24 L44 44 C41 35 33 28 24 24Z" fill="#5AADA8"/>
              <path d="M24 24 L44 44 C35 41 28 33 24 24Z" fill="#5AADA8" opacity="0.55"/>
              <!-- SW petal — navy -->
              <path d="M24 24 L4 44 C7 35 15 28 24 24Z" fill="#2B5278"/>
              <path d="M24 24 L4 44 C13 41 20 33 24 24Z" fill="#2B5278" opacity="0.55"/>
              <!-- Center -->
              <circle cx="24" cy="24" r="7" fill="#D4614A"/>
              <circle cx="24" cy="24" r="3" fill="#1A3A58"/>
            </svg>
          </td>

          <!-- Right — Name + details -->
          <td valign="top" style="padding-left:16px;">

            <!-- Name -->
            <div style="font-family:Georgia,'Times New Roman',serif;font-size:16px;font-weight:normal;color:#0A2A3A;letter-spacing:0.05em;margin-bottom:1px;">Meeta Vu</div>

            <!-- Title -->
            <div style="font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:#D4614A;margin-bottom:8px;">Chief Inspiration Officer</div>

            <!-- Brand name -->
            <div style="font-family:Georgia,'Times New Roman',serif;font-size:12px;font-weight:normal;color:#2B5278;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:2px;">Hale Textile Studio</div>

            <!-- Tagline -->
            <div style="font-family:Georgia,'Times New Roman',serif;font-size:11px;font-style:italic;color:#5A5248;margin-bottom:10px;">Your creative space for the home.</div>

            <!-- Divider -->
            <div style="width:100%;height:1px;background-color:#EDE0CC;margin-bottom:10px;"></div>

            <!-- Contact details -->
            <table role="presentation" cellspacing="0" cellpadding="0" border="0">

              <!-- Address -->
              <tr>
                <td style="padding-bottom:4px;">
                  <span style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:#5A5248;">Hub Coworking · 1050 Queen St, Suite 100 · Honolulu, HI 96814</span>
                </td>
              </tr>

              <!-- Email -->
              <tr>
                <td style="padding-bottom:4px;">
                  <a href="mailto:HaleTextileStudio@gmail.com" style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:#2B5278;text-decoration:none;">HaleTextileStudio@gmail.com</a>
                </td>
              </tr>

              <!-- Website -->
              <tr>
                <td style="padding-bottom:4px;">
                  <a href="https://haletextilestudio.com" style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:#2B5278;text-decoration:none;">haletextilestudio.com</a>
                </td>
              </tr>

              <!-- Instagram -->
              <tr>
                <td style="padding-bottom:4px;">
                  <a href="https://www.instagram.com/haletextilestudio/" style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:#5AADA8;text-decoration:none;">@haletextilestudio</a>
                </td>
              </tr>

              <!-- Calendly -->
              <tr>
                <td style="padding-top:4px;">
                  <a href="https://calendly.com/haletextilestudio/30min"
                    style="display:inline-block;background-color:#D4614A;color:#FFFFFF;font-family:Arial,Helvetica,sans-serif;font-size:8px;letter-spacing:0.4em;text-transform:uppercase;padding:7px 16px;text-decoration:none;">
                    Book a Studio Visit
                  </a>
                </td>
              </tr>

            </table>
          </td>
        </tr>
      </table>

      <!-- Bottom color bar -->
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top:14px;">
        <tr>
          <td width="60" height="2" style="background-color:#D4614A;font-size:0;">&nbsp;</td>
          <td width="30" height="2" style="background-color:#2B5278;font-size:0;">&nbsp;</td>
          <td width="30" height="2" style="background-color:#5AADA8;font-size:0;">&nbsp;</td>
        </tr>
      </table>

    </td>
  </tr>
</table>

</body>
</html>
